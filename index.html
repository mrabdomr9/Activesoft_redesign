<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Software & Business Management System | ActiveSoft</title>
  <meta name="description" content="ActiveSoft provides ERP software, accounting systems, inventory management, HR, POS, and business automation solutions for companies in Egypt." />
  <meta name="keywords" content="ERP System Egypt, ERP Software Egypt, Best ERP System, Accounting Software Egypt, Inventory Management System, POS System Egypt, HR & Payroll System, Manufacturing ERP, CRM Software Egypt, Business Management Software" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/index.css">
  <style>
    :root {
      --font-sans: 'Cairo', sans-serif;
      --font-display: 'Cairo', sans-serif;
    }

    html[dir="rtl"] {
      --font-sans: 'Cairo', sans-serif;
      --font-display: 'Cairo', sans-serif;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    body {
      background: radial-gradient(circle at top, #080816 0%, #03030a 70%, #010103 100%);
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      color: #e5e7eb;
    }

    body::before {
      content: "";
      position: absolute;
      top: 15%;
      left: 10%;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
      z-index: 1;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: absolute;
      bottom: 20%;
      right: 5%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.04) 0%, transparent 70%);
      z-index: 2;
      pointer-events: none;
    }

    #root {
      position: relative;
      z-index: 3;
    }

    .animate-on-scroll {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }

    .animate-on-scroll.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .bg-grid-pattern {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
      background-size: 2rem 2rem;
    }

    /* Animation keyframes */
    @keyframes slideBackground {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 150px 150px;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes growWidth {
      from {
        width: 0;
      }

      to {
        width: 6rem;
      }
    }

    /* Animation classes */
    .animate-fade-in {
      animation: fadeIn 0.8s ease-out forwards;
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .animate-fade-in-down {
      animation: fadeInDown 0.8s ease-out forwards;
    }

    .animate-fade-in-right {
      animation: fadeInRight 0.8s ease-out forwards;
    }

    .animate-grow-width {
      animation: growWidth 1s ease-out forwards;
    }

    /* Animation delays */
    .animation-delay-200 {
      animation-delay: 200ms;
    }

    .animation-delay-400 {
      animation-delay: 400ms;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary': '#06b6d4', // Cyan
            'secondary': '#8b5cf6', // Purple
            'accent': '#facc15', // Yellow
            'dark': '#0f172a', // Slate 900
            'light': '#e5e7eb', // Light Grey for text
          },
          fontFamily: {
            sans: 'var(--font-sans)',
            display: 'var(--font-display)',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap"
    rel="stylesheet">

</script>
</head>

</html>
